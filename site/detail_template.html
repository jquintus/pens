<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}} - Pens Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <style>
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            text-decoration: none;
            font-family: var(--mono);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        /* Detail page specific overrides to make it feel like a page, not a modal */
        .detail-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem clamp(1.25rem, 4vw, 3rem);
        }
        .preview__panel {
            width: 100%;
            max-height: none;
            position: static;
            box-shadow: none;
            border-color: var(--stroke);
            background: transparent;
        }
        .preview__layout {
            padding: 1.5rem 0;
        }
        .preview__header {
            padding: 0;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        .gallery-item {
            aspect-ratio: 4/3;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--stroke);
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }
        .gallery-item:hover {
            transform: scale(1.02);
            border-color: var(--accent);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gallery-item--viewer {
            background: var(--bg1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 0.5rem;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--accent);
            border: 1px dashed var(--accent);
        }
        .main-image-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg1);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--stroke);
            margin-bottom: 2rem;
            display: none; /* Hidden by default, shown if no 3D preview */
        }
        .main-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <header class="site-header">
      <div class="site-header__inner">
        <a href="../index.html" style="text-decoration: none; color: inherit;">
            <div class="brand">
            <span class="brand__mark" aria-hidden="true"></span>
            <div>
                <h1 class="brand__title">Pens</h1>
                <p class="brand__tag">Parametric configs to CAD downloads</p>
            </div>
            </div>
        </a>
      </div>
    </header>

    <main class="detail-container">
      <a href="../index.html" class="back-link">← Back to Gallery</a>

      <section class="preview__panel">
        <div class="preview__header">
          <div>
            <p class="preview__eyebrow">Interactive preview</p>
            <h2 class="preview__title">{{TITLE}}</h2>
            <p class="preview__meta">{{ID}} | {{SLUG}}</p>
          </div>
        </div>

        <div class="preview__layout">
          <div class="preview__viewer-shell">
            <div id="viewer" class="viewer" aria-live="polite"></div>
            <div id="viewer-status" class="viewer__status">Loading preview...</div>
            <div id="main-image" class="main-image-container">
                <img src="../{{IMAGE}}" alt="{{TITLE}}">
            </div>
          </div>

          <aside class="preview__sidebar">
            <p class="preview__description">{{DESCRIPTION}}</p>
            
            <h3 style="margin-top: 2rem; font-size: 1rem; color: var(--accent);">Downloads</h3>
            <div class="downloads downloads--stack">
                {{DOWNLOADS}}
            </div>

            <h3 style="margin-top: 2rem; font-size: 1rem; color: var(--accent);">Parameters</h3>
            <ul class="metrics metrics--stack">
                {{METRICS}}
            </ul>
          </aside>
        </div>

        <h3 style="margin-top: 3rem; font-size: 1.25rem;">Gallery</h3>
        <div class="gallery-grid">
            <div class="gallery-item gallery-item--viewer" onclick="showViewer()">
                <span style="font-size: 1.5rem;">📦</span>
                <span>3D Viewer</span>
            </div>
            {{GALLERY}}
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>Built from YAML nose_cone + CadQuery</span>
    </footer>

    <script type="module">
        import { mountViewer } from '../viewer.js';

        const stlUrl = '{{STL_URL}}';
        const viewerContainer = document.getElementById('viewer');
        const viewerStatus = document.getElementById('viewer-status');
        const mainImage = document.getElementById('main-image');
        
        const state = {
            token: 1,
            currentToken: 1,
            cleanup: null
        };

        window.showViewer = () => {
            if (stlUrl && stlUrl !== 'null') {
                mainImage.style.display = 'none';
                viewerContainer.style.display = 'block';
                viewerStatus.style.display = 'block';
                state.currentToken++;
                state.token = state.currentToken;
                mountViewer(viewerContainer, viewerStatus, '../' + stlUrl, state);
            }
        };

        if (stlUrl && stlUrl !== 'null') {
            mountViewer(viewerContainer, viewerStatus, '../' + stlUrl, state);
        } else {
            viewerContainer.style.display = 'none';
            viewerStatus.style.display = 'none';
            mainImage.style.display = 'block';
        }

        // Simple gallery logic
        window.setMainImage = (src) => {
            const img = mainImage.querySelector('img');
            img.src = src;
            viewerContainer.style.display = 'none';
            viewerStatus.style.display = 'none';
            mainImage.style.display = 'block';
        };
    </script>
  </body>
</html>
