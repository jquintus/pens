media:
  input: assets
  output: /assets
  rename: safe
  extensions: [svg, png, jpg, jpeg, webp, avif]

components:
  dimensions:
    type: object
    label: Dimensions (mm)
    fields:
      - name: cylinder_height
        type: number
        required: true
      - name: cylinder_diameter
        type: number
        required: true
      - name: frustum_height
        type: number
        required: true
      - name: frustum_top_diameter
        type: number
        required: true
      - name: frustum_bottom_diameter
        type: number
        required: true
      - name: top_hole_diameter
        type: number
        required: true
      - name: bottom_hole_diameter
        type: number
        required: true
      - name: top_hole_height
        type: number
        required: true

content:
  - name: configurations
    label: Pen configurations
    type: collection
    path: configurations
    format: yaml
    exclude:
      - README.md
    view:
      primary: id
      sort: id
    filename: "{primary}.yml"
    fields:
      - name: id
        type: string
        required: true
        label: ID (slug; also used as the default output basename)
        pattern: "^[a-z0-9_-]+$"
      - name: title
        type: string
        required: true
      - name: description
        type: text
        label: Short description
      - name: dimensions
        component: dimensions
      - name: gallery
        label: Gallery images
        type: image
        options:
          multiple:
            max: 8
          extensions: [svg, png, jpg, jpeg, webp, avif]
