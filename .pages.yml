media:
  input: assets
  output: /assets
  rename: safe
  extensions: [svg, png, jpg, jpeg, webp, avif]

components:
  nose_cone:
    type: object
    label: Nose Cone (mm)
    fields:
      - name: cylinder_height
        type: number
        required: true
      - name: cylinder_outside_diameter
        type: number
        required: true
      - name: frustum_height
        type: number
        required: true
      - name: frustum_top_diameter
        type: number
        required: true
      - name: frustum_bottom_diameter
        type: number
        required: true
      - name: top_hole_diameter
        type: number
        required: true
      - name: bottom_hole_diameter
        type: number
        required: true
      - name: top_hole_height
        type: number
        required: true

content:
  - name: configurations
    label: Pen configurations
    type: collection
    path: configurations
    format: yaml
    exclude:
      - README.md
    view:
      primary: id
      sort: id
    filename: "{primary}.yml"
    fields:
      - name: id
        type: string
        required: true
        label: ID (slug; also used as the default output basename)
        pattern: "^[a-z0-9_-]+$"
      - name: title
        type: string
        required: true
      - name: description
        type: text
        label: Short description
      - name: nose_cone
        component: nose_cone
      - name: slicing_profiles
        label: Slicing Profiles
        type: select
        options:
          multiple: true
          values:
            - 0.2_fast
            - 0.2_quality
            - 0.4_fast
            - 0.4_quality
            - 0.6_fast
            - 0.6_quality
      - name: gallery
        label: Gallery images
        type: image
        options:
          multiple:
            max: 8
          extensions: [svg, png, jpg, jpeg, webp, avif]

  - name: models
    label: Custom models
    type: collection
    path: models
    format: yaml
    view:
      primary: id
      sort: id
    filename: "{actual_slug}/config.yml"
    fields:
      - name: id
        type: string
        required: true
      - name: title
        type: string
        required: true
      - name: description
        type: text
      - name: slicing_profiles
        label: Slicing Profiles
        type: select
        options:
          multiple: true
          values:
            - 0.2_fast
            - 0.2_quality
            - 0.4_fast
            - 0.4_quality
            - 0.6_fast
            - 0.6_quality
      - name: gallery
        label: Gallery images
        type: image
        options:
          multiple:
            max: 8
          extensions: [svg, png, jpg, jpeg, webp, avif]
