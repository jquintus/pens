name: Build CAD on Release

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag to attach build artifacts to"
        type: string
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1

      - name: Install Python deps
        run: |
          pip install cadquery pyyaml

      - name: Run build
        run: python scripts/build.py

      - name: Upload assets (published release from GitHub UI/API)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: outputs/*

      - name: Upload assets (after Create Release workflow)
        if: github.event_name == 'workflow_call'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: outputs/*
