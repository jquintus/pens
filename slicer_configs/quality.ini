# Quality settings for 0.2mm nozzle
nozzle_diameter = 0.2
filament_diameter = 1.75
extrusion_multiplier = 1.0
layer_height = 0.10
first_layer_height = 0.10
perimeters = 3
top_solid_layers = 6
bottom_solid_layers = 4
fill_density = 15%
fill_pattern = gyroid

# Speeds
infill_speed = 40
perimeter_speed = 30
external_perimeter_speed = 20
first_layer_speed = 10

# Cooling (CRITICAL for quality on small parts)
slowdown_below_layer_time = 15
min_print_speed = 2
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100

# Machine limits
max_volumetric_speed = 0.8
travel_speed = 120
max_acceleration_x = 2000
max_acceleration_y = 2000
max_acceleration_z = 200
max_acceleration_e = 2000

# G-code flavor
gcode_flavor = marlin
support_material = 0
