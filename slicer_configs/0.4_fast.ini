# Fast settings for 0.4mm nozzle (Bambu Compatible)
nozzle_diameter = 0.4
filament_diameter = 1.75
extrusion_multiplier = 1.0
layer_height = 0.20
first_layer_height = 0.20
perimeters = 2
top_solid_layers = 5
bottom_solid_layers = 3
fill_density = 15%
fill_pattern = grid

# Speeds
infill_speed = 150
perimeter_speed = 100
external_perimeter_speed = 80
first_layer_speed = 30

# Cooling
slowdown_below_layer_time = 8
min_print_speed = 10
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100

# Machine limits
max_volumetric_speed = 12
travel_speed = 200
max_acceleration_x = 10000
max_acceleration_y = 10000
max_acceleration_z = 500
max_acceleration_e = 5000

# G-code metadata for Bambu Studio
gcode_flavor = marlin2
thumbnails = 300x300
printer_model = P1S
printer_notes = PRINTER_VENDOR_BAMBULAB; PRINTER_MODEL_P1S; NOZZLE_DIAMETER_0.4
start_gcode = G90 ; use absolute coordinates\nM83 ; extruder relative mode\nM104 S150 ; set temporary nozzle temp\nM140 S60 ; set bed temp\nG28 ; home all axes\nG29 ; bed leveling\nM109 S220 ; wait for nozzle temp\nG1 Z2.0 F3000 ; move Z Axis up\nG1 X0.1 Y20 Z0.3 F5000.0 ; move to start position\nG1 X0.1 Y200.0 Z0.3 F1500.0 E15 ; draw prime line\nG1 X0.4 Y200.0 Z0.3 F5000.0 ; move to side\nG1 X0.4 Y20 Z0.3 F1500.0 E30 ; draw second prime line\nG92 E0 ; reset extruder\nG1 Z2.0 F3000 ; move Z Axis up
end_gcode = G92 E0 ; prepare to retract\nG1 E-0.5 F3000 ; retract a bit\nG1 Z{layer_height + 0.5} F300 ; move z up a bit\nG28 X Y ; home X and Y\nM104 S0 ; turn off temperature\nM140 S0 ; turn off heatbed\nM107 ; turn off fan\nM84 ; disable motors
support_material = 0
