# Fast settings for 0.2mm nozzle
nozzle_diameter = 0.2
filament_diameter = 1.75
extrusion_multiplier = 1.0
layer_height = 0.15
first_layer_height = 0.15
perimeters = 2
top_solid_layers = 4
bottom_solid_layers = 3
fill_density = 10%
