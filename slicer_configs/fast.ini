# Fast settings for 0.2mm nozzle
nozzle_diameter = 0.2
filament_diameter = 1.75
extrusion_multiplier = 1.0
layer_height = 0.15
first_layer_height = 0.15
perimeters = 2
top_solid_layers = 4
bottom_solid_layers = 3
fill_density = 10%
fill_pattern = grid

# Speeds
infill_speed = 60
perimeter_speed = 40
external_perimeter_speed = 30
first_layer_speed = 15

# Cooling (CRITICAL for small parts)
slowdown_below_layer_time = 10
min_print_speed = 5
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100

# Machine limits
max_volumetric_speed = 1.2
travel_speed = 150
max_acceleration_x = 5000
max_acceleration_y = 5000
max_acceleration_z = 500
max_acceleration_e = 5000

# G-code flavor
gcode_flavor = marlin
support_material = 0
