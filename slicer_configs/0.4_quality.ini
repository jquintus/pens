# Quality settings for 0.4mm nozzle (Bambu Compatible)
nozzle_diameter = 0.4
filament_diameter = 1.75
extrusion_multiplier = 1.0
layer_height = 0.12
first_layer_height = 0.12
perimeters = 3
top_solid_layers = 7
bottom_solid_layers = 5
fill_density = 15%
fill_pattern = gyroid

# Speeds
infill_speed = 100
perimeter_speed = 80
external_perimeter_speed = 60
first_layer_speed = 20

# Cooling
slowdown_below_layer_time = 12
min_print_speed = 5
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100

# Machine limits
max_volumetric_speed = 8
travel_speed = 150
max_acceleration_x = 5000
max_acceleration_y = 5000
max_acceleration_z = 200
max_acceleration_e = 5000

# G-code metadata for Bambu Studio
gcode_flavor = marlin2
thumbnails = 300x300
printer_model = Generic
printer_notes = PRINTER_VENDOR_BAMBULAB; PRINTER_MODEL_GENERIC; NOZZLE_DIAMETER_0.4
start_gcode = ; nozzle_diameter = 0.4\nG21 ; set units to millimeters\nG90 ; use absolute coordinates\nM83 ; use relative distances for extrusion
support_material = 0
